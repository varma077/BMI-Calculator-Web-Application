<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BMI Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Theme Toggle -->
  <button class="theme-btn" id="themeBtn" title="Toggle theme">
    <span class="theme-icon" id="themeIcon">☀</span>
  </button>

  <div class="page">

    <!-- Hero -->
    <div class="hero">
      <p class="hero-eyebrow">Know your numbers</p>
      <h1 class="hero-title">BMI Calculator</h1>
      <p class="hero-sub">Body Mass Index · Metric (kg & cm)</p>
    </div>

    <!-- Card -->
    <div class="card">

      <!-- Inputs -->
      <div class="inputs">
        <div class="field">
          <label for="weight">Weight</label>
          <div class="input-wrap">
            <input id="weight" type="number" placeholder="70" min="1" max="300" step="0.1" />
            <span class="unit">kg</span>
          </div>
        </div>
        <div class="field">
          <label for="height">Height</label>
          <div class="input-wrap">
            <input id="height" type="number" placeholder="175" min="1" max="300" step="0.1" />
            <span class="unit">cm</span>
          </div>
        </div>
      </div>

      <button class="calc-btn" id="calcBtn">Calculate BMI</button>
      <p class="error-msg" id="errorMsg"></p>

      <!-- Result (hidden until calculated) -->
      <div class="result" id="result">

        <div class="bmi-display">
          <span class="bmi-label">Your BMI</span>
          <span class="bmi-value" id="bmiValue">—</span>
          <span class="bmi-category" id="bmiCategory"></span>
        </div>

        <!-- BMI Scale Bar -->
        <div class="scale-wrap">
          <div class="scale-bar">
            <div class="scale-segment s-under">Underweight<br/>&lt;18.5</div>
            <div class="scale-segment s-normal">Normal<br/>18.5–24.9</div>
            <div class="scale-segment s-over">Overweight<br/>25–29.9</div>
            <div class="scale-segment s-obese">Obese<br/>≥30</div>
          </div>
          <div class="scale-pointer" id="scalePointer"></div>
        </div>

        <!-- Info Row -->
        <div class="info-grid">
          <div class="info-box">
            <p class="info-label">Ideal Weight Range</p>
            <p class="info-value" id="idealRange">—</p>
          </div>
          <div class="info-box">
            <p class="info-label">Health Tip</p>
            <p class="info-value tip" id="healthTip">—</p>
          </div>
        </div>

      </div><!-- /result -->

    </div><!-- /card -->

    <!-- BMI Reference Table -->
    <div class="ref-table">
      <p class="ref-title">BMI Categories</p>
      <div class="ref-rows">
        <div class="ref-row"><span class="dot under"></span><span>Underweight</span><span class="ref-range">&lt; 18.5</span></div>
        <div class="ref-row"><span class="dot normal"></span><span>Normal weight</span><span class="ref-range">18.5 – 24.9</span></div>
        <div class="ref-row"><span class="dot over"></span><span>Overweight</span><span class="ref-range">25 – 29.9</span></div>
        <div class="ref-row"><span class="dot obese"></span><span>Obese</span><span class="ref-range">≥ 30</span></div>
      </div>
    </div>

  </div><!-- /page -->

  <script src="app.js"></script>
</body>
</html>
